apiVersion: batch/v1
kind: Job
metadata:
  name: mdai-generate-single-log
  namespace: synthetics
  labels:
    app.kubernetes.io/name: mdai-generate-single-log
    app.kubernetes.io/part-of: mdai-log-generator
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mdai-generate-single-log
        app.kubernetes.io/part-of: mdai-log-generator
        service: service9999

      annotations:
        # Datadog Autodiscovery annotation.
        # The suffix "service9999" must match the container name below.
        #
        # This tells the Datadog Agent:
        # - collect logs from this container
        # - tag them with source:synthetic
        # - tag them with service:service9999
        ad.datadoghq.com/service9999.logs: >-
          [{"source":"synthetic","service":"service9999"}]

    spec:
      restartPolicy: Never

      containers:
        - name: service9999
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              memory: "32Mi"
              cpu: "50m"
            requests:
              memory: "16Mi"
              cpu: "10m"
          command:
            - sh
            - -c
            - |
              ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

              # Emit exactly one log line to stdout.
              # Kubernetes writes this to the container log file.
              # The Datadog Agent tails that file from the node.
              echo "{\"timestamp\":\"$ts\",\"level\":\"INFO\",\"service\":\"service9999\",\"team\":\"teamZ\",\"region\":\"us-east-1\",\"traffic_profile\":\"single\",\"event_id\":1,\"message\":\"Single synthetic log event from service9999 for Datadog Agent tailing validation.\"}"
