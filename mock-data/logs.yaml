                - name: RATE
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-telemetrygen-settings
                      key: XNOISY_RATE
                - name: LOG_MESSAGE
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-telemetrygen-settings
                      key: COMMON_LOG_MESSAGE
              args:
                - logs
                - --otlp-insecure
                - --otlp-endpoint=$(HOST_IP):4317
                - --duration=$(DURATION)
                - --rate=$(RATE)
                - --service=service4321
                - '--otlp-attributes=service.name="service4321"'
