# Generates synthetic container logs for Datadog Agent log collection.
#
# This does NOT send OTLP data anywhere.
# Each BusyBox container writes JSON logs to stdout.
# Kubernetes writes stdout/stderr to node log files.
# The Datadog Agent tails those container log files and forwards them.
#
# Required Datadog Agent settings:
#
# datadog:
#   logs:
#     enabled: true
#     containerCollectAll: false
#     containerCollectUsingFiles: true
#
# The ad.datadoghq.com/<container-name>.logs annotations below tell the
# Datadog Agent which container logs to collect and which Datadog service
# name to attach to those logs.

apiVersion: v1
kind: ConfigMap
metadata:
  # Shared runtime settings for all synthetic log containers.
  name: mdai-generate-logs-settings
  namespace: synthetics
data:
  # Each CronJob run lasts slightly less than the 1-minute schedule.
  # This helps avoid overlapping runs.
  DURATION_SECONDS: "55"

  # Base services emit roughly 1 log/sec.
  BASE_SLEEP_SECONDS: "1"

  # Noisy service emits roughly 20 logs/sec.
  NOISY_SLEEP_SECONDS: "0.05"

  # Extra noisy service emits roughly 100 logs/sec.
  XNOISY_SLEEP_SECONDS: "0.01"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mdai-generate-logs
  namespace: synthetics
  labels:
    app.kubernetes.io/name: mdai-generate-logs
    app.kubernetes.io/part-of: mdai-log-generator
spec:
  # Run once per minute.
  schedule: "* * * * *"

  # Prevent a new run from starting if the previous one is still active.
  concurrencyPolicy: Forbid

  # Keep only a small number of completed jobs.
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3

  jobTemplate:
    spec:
      # Retry once if the job fails.
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mdai-generate-logs
            app.kubernetes.io/part-of: mdai-log-generator

          annotations:
            # Annotation suffix must match container name exactly: base-info.
            # Logs from this container will be tagged service:service0.
            ad.datadoghq.com/base-info.logs: >-
              [{"source":"synthetic","service":"service0"}]

            # Annotation suffix must match container name exactly: base-warning.
            # Logs from this container will be tagged service:service17.
            ad.datadoghq.com/base-warning.logs: >-
              [{"source":"synthetic","service":"service17"}]

            # Annotation suffix must match container name exactly: base-error.
            # Logs from this container will be tagged service:service42.
            ad.datadoghq.com/base-error.logs: >-
              [{"source":"synthetic","service":"service42"}]

            # Annotation suffix must match container name exactly: noisy.
            # Logs from this container will be tagged service:service1234.
            ad.datadoghq.com/noisy.logs: >-
              [{"source":"synthetic","service":"service1234"}]

            # Annotation suffix must match container name exactly: xnoisy.
            # Logs from this container will be tagged service:service4321.
            ad.datadoghq.com/xnoisy.logs: >-
              [{"source":"synthetic","service":"service4321"}]

        spec:
          # Each CronJob pod runs to completion.
          restartPolicy: Never

          containers:
            # Low-volume INFO logs for service0.
            - name: base-info
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: "64Mi"
                  cpu: "100m"
                requests:
                  memory: "32Mi"
                  cpu: "25m"
              env:
                # How long this container should emit logs.
                - name: DURATION_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: DURATION_SECONDS

                # How long to sleep between log lines.
                - name: SLEEP_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: BASE_SLEEP_SECONDS
              command:
                - sh
                - -c
                - |
                  # Emit JSON logs until DURATION_SECONDS has elapsed.
                  end=$(( $(date +%s) + DURATION_SECONDS ))
                  i=0
                  while [ "$(date +%s)" -lt "$end" ]; do
                    ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

                    # Write to stdout. Kubernetes stores this as a container log.
                    # The Datadog Agent tails it from the node filesystem.
                    echo "{\"timestamp\":\"$ts\",\"level\":\"INFO\",\"service\":\"service0\",\"team\":\"teamC\",\"region\":\"us-east-1\",\"traffic_profile\":\"base\",\"event_id\":$i,\"message\":\"The algorithm successfully executed, triggering neural pathways and producing a burst of optimized data streams.\"}"

                    i=$((i+1))
                    sleep "$SLEEP_SECONDS"
                  done

            # Low-volume WARN logs for service17.
            - name: base-warning
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: "64Mi"
                  cpu: "100m"
                requests:
                  memory: "32Mi"
                  cpu: "25m"
              env:
                - name: DURATION_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: DURATION_SECONDS
                - name: SLEEP_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: BASE_SLEEP_SECONDS
              command:
                - sh
                - -c
                - |
                  end=$(( $(date +%s) + DURATION_SECONDS ))
                  i=0
                  while [ "$(date +%s)" -lt "$end" ]; do
                    ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                    echo "{\"timestamp\":\"$ts\",\"level\":\"WARN\",\"service\":\"service17\",\"team\":\"teamQ\",\"region\":\"us-east-1\",\"traffic_profile\":\"base\",\"event_id\":$i,\"message\":\"Synthetic warning condition observed in downstream dependency.\"}"
                    i=$((i+1))
                    sleep "$SLEEP_SECONDS"
                  done

            # Low-volume ERROR logs for service42.
            - name: base-error
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: "64Mi"
                  cpu: "100m"
                requests:
                  memory: "32Mi"
                  cpu: "25m"
              env:
                - name: DURATION_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: DURATION_SECONDS
                - name: SLEEP_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: BASE_SLEEP_SECONDS
              command:
                - sh
                - -c
                - |
                  end=$(( $(date +%s) + DURATION_SECONDS ))
                  i=0
                  while [ "$(date +%s)" -lt "$end" ]; do
                    ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                    echo "{\"timestamp\":\"$ts\",\"level\":\"ERROR\",\"service\":\"service42\",\"team\":\"teamZ\",\"region\":\"us-east-1\",\"traffic_profile\":\"base\",\"event_id\":$i,\"message\":\"Synthetic error event emitted for log pipeline validation.\"}"
                    i=$((i+1))
                    sleep "$SLEEP_SECONDS"
                  done

            # Higher-volume INFO logs for service1234.
            - name: noisy
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: "64Mi"
                  cpu: "150m"
                requests:
                  memory: "32Mi"
                  cpu: "50m"
              env:
                - name: DURATION_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: DURATION_SECONDS
                - name: SLEEP_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: NOISY_SLEEP_SECONDS
              command:
                - sh
                - -c
                - |
                  end=$(( $(date +%s) + DURATION_SECONDS ))
                  i=0
                  while [ "$(date +%s)" -lt "$end" ]; do
                    ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                    echo "{\"timestamp\":\"$ts\",\"level\":\"INFO\",\"service\":\"service1234\",\"team\":\"teamA\",\"region\":\"us-east-1\",\"traffic_profile\":\"noisy\",\"event_id\":$i,\"message\":\"High-volume synthetic log event from noisy service.\"}"
                    i=$((i+1))
                    sleep "$SLEEP_SECONDS"
                  done

            # Highest-volume INFO logs for service4321.
            - name: xnoisy
              image: busybox:1.36
              imagePullPolicy: IfNotPresent
              resources:
                limits:
                  memory: "64Mi"
                  cpu: "250m"
                requests:
                  memory: "32Mi"
                  cpu: "75m"
              env:
                - name: DURATION_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: DURATION_SECONDS
                - name: SLEEP_SECONDS
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-generate-logs-settings
                      key: XNOISY_SLEEP_SECONDS
              command:
                - sh
                - -c
                - |
                  end=$(( $(date +%s) + DURATION_SECONDS ))
                  i=0
                  while [ "$(date +%s)" -lt "$end" ]; do
                    ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
                    echo "{\"timestamp\":\"$ts\",\"level\":\"INFO\",\"service\":\"service4321\",\"team\":\"teamB\",\"region\":\"us-east-1\",\"traffic_profile\":\"xnoisy\",\"event_id\":$i,\"message\":\"Extremely high-volume synthetic log event from extra noisy service.\"}"
                    i=$((i+1))
                    sleep "$SLEEP_SECONDS"
                  done
