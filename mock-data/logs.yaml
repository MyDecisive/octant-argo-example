                    configMapKeyRef:
                      name: mdai-telemetrygen-settings
                      key: DURATION
                - name: RATE
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-telemetrygen-settings
                      key: BASE_RATE
                - name: LOG_MESSAGE
                  valueFrom:
                    configMapKeyRef:
                      name: mdai-telemetrygen-settings
                      key: COMMON_LOG_MESSAGE
              args:
                - logs
                - --otlp-insecure
                - --otlp-endpoint=$(HOST_IP):4317
                - --duration=$(DURATION)
                - --rate=$(RATE)
                - --service=service42
                - '--otlp-attributes=service.name="service42"'
                - --severity-text=ERROR
                - --severity-number=17
                - --body=$(LOG_MESSAGE)
                - '--telemetry-attributes=team="teamZ"'
                - '--telemetry-attributes=region="us-east-1"'
                - '--telemetry-attributes=generator="telemetrygen"'
                - '--telemetry-attributes=traffic_profile="base"'

            - name: noisy-service1234-teama
