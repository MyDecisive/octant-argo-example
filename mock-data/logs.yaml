                - '--telemetry-attributes=generator="telemetrygen"'
                - '--telemetry-attributes=traffic_profile="noisy"'

            - name: xnoisy-service4321-teamb
              image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
              imagePullPolicy: IfNotPresent
