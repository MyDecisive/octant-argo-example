deployment:
  name: octant-ui
  replicas: 1
  containerPort: 8080
  tolerations: []
  nodeSelector: {}
  affinity: {}
  annotations: {}
  gateway_host: http://mdai-gateway.mdai.svc.cluster.local:8081
  argocd_host: https://argo-cd-argocd-server.argocd.svc.cluster.local

image:
  repository: ghcr.io/mydecisive/octant-ui
  tag: 0.1.4
  pullPolicy: IfNotPresent

service:
  name: octant-ui
  replicas: 1
  port: 8080
  targetPort: 8080
  type: ClusterIP
