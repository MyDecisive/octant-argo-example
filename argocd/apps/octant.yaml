apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: octant
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
  - repoURL: https://github.com/MyDecisive/octant-ui.git
    targetRevision: feat/api-foundation
    helm:
      parameters:
        - name: deployment.gateway_host
          value: http://mdai-gateway.mdai.svc.cluster.local:8081
  - repoURL: ghcr.io/mydecisive/charts/octant
    chart: octant
    targetRevision: 0.1.0
  - repoURL: https://github.com/MyDecisive/octant-argo-example.git
    targetRevision: feat/octant-app
    ref: values
  - repoURL: https://github.com/MyDecisive/octant-argo-example.git
    targetRevision: main
  destination:
    name: "in-cluster"
    namespace: octant
  syncPolicy:
    automated:
      enabled: true
      prune: true
    syncOptions:
    - PruneLast=true
    - CreateNamespace=true
    - ServerSideApply=true
    retry:
      limit: 2
