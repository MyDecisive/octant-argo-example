apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: octant
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  sources:
    - repoURL: https://github.com/MyDecisive/octant.git
      targetRevision: rlaw/octant-install-log
      path: ./deployment
  destination:
    name: "in-cluster"
    namespace: octant
  syncPolicy:
    automated:
      enabled: true
      prune: true
    syncOptions:
      - PruneLast=true
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 2
