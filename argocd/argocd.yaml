apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-octant
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/MyDecisive/octant-argo-example.git
    targetRevision: main
    path: argocd/apps/
  destination:
    name: in-cluster
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
